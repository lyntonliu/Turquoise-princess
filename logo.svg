<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle (optional, transparent) -->

  <!-- Crown outline - thin, geometric, modern -->
  <path d="M30 148 L50 72 L80 106 L100 32 L120 106 L150 72 L170 148 Z"
        fill="none" stroke="#0097a7" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Crown base bar -->
  <rect x="22" y="148" width="156" height="7" rx="3.5" fill="#0097a7"/>

  <!-- Center gem (teardrop shape) -->
  <ellipse cx="100" cy="34" rx="11" ry="13" fill="#0097a7"/>
  <ellipse cx="100" cy="34" rx="6" ry="7" fill="#c9a96e" opacity="0.9"/>

  <!-- Left spike gem dot -->
  <circle cx="50" cy="72" r="5" fill="#c9a96e"/>

  <!-- Right spike gem dot -->
  <circle cx="150" cy="72" r="5" fill="#c9a96e"/>

  <!-- Inner crown decorative line -->
  <path d="M30 148 L50 72 L80 106 L100 32 L120 106 L150 72 L170 148"
        fill="none" stroke="#c9a96e" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.4"/>
</svg>
